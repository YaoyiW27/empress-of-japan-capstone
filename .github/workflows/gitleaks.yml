name: secret-scan

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GITLEAKS_VERSION: 8.18.4

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          install_dir="$RUNNER_TEMP/gitleaks"
          mkdir -p "$install_dir"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o "$RUNNER_TEMP/gitleaks.tar.gz"
          tar -xzf "$RUNNER_TEMP/gitleaks.tar.gz" -C "$install_dir" gitleaks
          chmod +x "$install_dir/gitleaks"
          echo "$install_dir" >> "$GITHUB_PATH"
          "$install_dir/gitleaks" version

      - name: Scan for committed secrets
        run: gitleaks detect --source . --redact --verbose
