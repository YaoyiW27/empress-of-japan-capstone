name: deploy-backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "data/ai/personas/**"
      - ".dockerignore"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
  # A terraform apply can change the backend task definition (e.g. CORS_ORIGINS
  # when a frontend origin is added). The ECS service ignores task_definition
  # changes (infra/terraform/ecs.tf), so a new revision only reaches the running
  # service on the next backend deploy. Chain this workflow after terraform-apply
  # so an infra apply is always followed by a rollout that picks up the revision —
  # the "backend rollout" step of the apply -> rollout -> frontend-publish order.
  workflow_run:
    workflows: [terraform-apply]
    types: [completed]

concurrency:
  group: deploy-backend-sandbox
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: empress-backend
  ECS_CLUSTER: empress-app
  ECS_SERVICE: empress-backend
  CONTAINER_NAME: backend
  ECS_MIN_CAPACITY_PARAMETER: /empress/ecs/backend_autoscaling_min_capacity
  WORKER_SERVICE: empress-worker
  WORKER_CONTAINER_NAME: worker
  WORKER_DESIRED_COUNT_PARAMETER: /empress/ecs/worker_desired_count

jobs:
  deploy:
    name: Build, scan, and deploy
    runs-on: ubuntu-latest
    # When chained off terraform-apply, only roll out if that apply succeeded.
    # Push and manual dispatch runs are unaffected.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for deployment infrastructure
        run: |
          for attempt in {1..60}; do
            SERVICE_NAME=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVICE" \
              --query 'services[0].serviceName' \
              --output text 2>/dev/null || true)
            WORKER_SERVICE_NAME=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$WORKER_SERVICE" \
              --query 'services[0].serviceName' \
              --output text 2>/dev/null || true)
            SCALING_TARGET_COUNT=$(aws application-autoscaling describe-scalable-targets \
              --service-namespace ecs \
              --resource-ids "service/$ECS_CLUSTER/$ECS_SERVICE" \
              --scalable-dimension ecs:service:DesiredCount \
              --query 'length(ScalableTargets)' \
              --output text 2>/dev/null || true)

            if aws ecr describe-repositories \
              --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1 &&
              aws ssm get-parameter \
                --name "$ECS_MIN_CAPACITY_PARAMETER" >/dev/null 2>&1 &&
              aws ssm get-parameter \
                --name "$WORKER_DESIRED_COUNT_PARAMETER" >/dev/null 2>&1 &&
              [ "$SERVICE_NAME" = "$ECS_SERVICE" ] &&
              [ "$WORKER_SERVICE_NAME" = "$WORKER_SERVICE" ] &&
              [ "$SCALING_TARGET_COUNT" = "1" ]; then
              echo "ECR, API, worker, and autoscaling infrastructure are ready."
              exit 0
            fi

            echo "Waiting for Terraform apply ($attempt/60)..."
            sleep 10
          done

          echo "Deployment infrastructure was not ready after 10 minutes." >&2
          exit 1

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2.1.6

      - name: Build amd64 backend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            --file backend/Dockerfile \
            --tag "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "image"
          image-ref: "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          format: "table"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          exit-code: "1"

      - name: Push immutable image tags
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          if aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids imageTag="$IMAGE_TAG" >/dev/null 2>&1; then
            echo "Image tag $IMAGE_TAG already exists; skipping immutable re-push."
          else
            docker push "$IMAGE"
          fi

          if ! aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids imageTag=bootstrap >/dev/null 2>&1; then
            docker tag "$IMAGE" "$REGISTRY/$ECR_REPOSITORY:bootstrap"
            docker push "$REGISTRY/$ECR_REPOSITORY:bootstrap"
          fi

      - name: Download latest task definition
        run: |
          set -euo pipefail

          # Prefer a Terraform-registered revision that already contains the
          # current AWS frontend CloudFront origins in CORS_ORIGINS. The initial
          # frontend rollout can trigger a push deploy in parallel with
          # terraform-apply; a newer app-image revision may therefore exist that
          # was rendered from the old Vercel-only CORS config. Starting from the
          # CORS-aware revision avoids carrying stale env forward.
          SITES_JSON=$(aws ssm get-parameter \
            --name /empress/frontend/sites \
            --query 'Parameter.Value' --output text 2>/dev/null || true)
          SELECTED_TASKDEF=""

          if [ -n "$SITES_JSON" ] && [ "$SITES_JSON" != "None" ]; then
            mapfile -t FRONTEND_ORIGINS < <(echo "$SITES_JSON" | jq -r '.[].url')
            mapfile -t CANDIDATES < <(aws ecs list-task-definitions \
              --family-prefix "$ECS_SERVICE" \
              --status ACTIVE \
              --sort DESC \
              --max-items 25 \
              --query 'taskDefinitionArns[]' \
              --output text | tr '\t' '\n')

            for candidate in "${CANDIDATES[@]}"; do
              aws ecs describe-task-definition \
                --task-definition "$candidate" \
                --query taskDefinition > candidate-task-definition.json
              CORS_VALUE=$(jq -r '.containerDefinitions[]
                | select(.name == env.CONTAINER_NAME)
                | (.environment // [])
                | map(select(.name == "CORS_ORIGINS").value)
                | .[0] // ""' candidate-task-definition.json)

              has_all_origins=1
              for origin in "${FRONTEND_ORIGINS[@]}"; do
                if ! echo "$CORS_VALUE" | jq -e --arg origin "$origin" 'fromjson | index($origin) != null' >/dev/null 2>&1; then
                  has_all_origins=0
                  break
                fi
              done

              if [ "$has_all_origins" -eq 1 ]; then
                SELECTED_TASKDEF="$candidate"
                cp candidate-task-definition.json task-definition.json
                break
              fi
            done
          fi

          if [ -z "$SELECTED_TASKDEF" ]; then
            SELECTED_TASKDEF=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVICE" \
              --query 'services[0].taskDefinition' \
              --output text)
            aws ecs describe-task-definition \
              --task-definition "$SELECTED_TASKDEF" \
              --query taskDefinition > task-definition.json
          fi

          echo "Using task definition baseline: $SELECTED_TASKDEF"

      - name: Render task definition with new image
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1.8.5
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"

      # Apply DB migrations on the freshly built image BEFORE rolling the service
      # over, so new code never runs against an un-migrated schema. A failed
      # migration aborts the deploy.
      - name: Run database migrations
        env:
          RENDERED_TASKDEF: ${{ steps.render.outputs.task-definition }}
        run: |
          set -euo pipefail

          # Migrations need a live DB. RDS is often stopped to save sandbox cost,
          # so start it automatically and wait until it's available.
          DB_INSTANCE_IDENTIFIER=empress-knowledge-base
          describe_db_status() {
            aws rds describe-db-instances \
              --db-instance-identifier "$DB_INSTANCE_IDENTIFIER" \
              --query 'DBInstances[0].DBInstanceStatus' \
              --output text
          }

          wait_for_db_status() {
            local target_status="$1"
            local timeout_seconds="$2"
            local elapsed=0
            local sleep_seconds=30
            local status

            while [ "$elapsed" -le "$timeout_seconds" ]; do
              status=$(describe_db_status)
              echo "RDS $DB_INSTANCE_IDENTIFIER status: $status"

              if [ "$status" = "$target_status" ]; then
                return 0
              fi

              case "$status" in
                failed|incompatible-restore|incompatible-network|storage-full)
                  echo "RDS $DB_INSTANCE_IDENTIFIER reached terminal status '$status' while waiting for '$target_status'." >&2
                  return 1
                  ;;
              esac

              sleep "$sleep_seconds"
              elapsed=$((elapsed + sleep_seconds))
            done

            echo "Timed out after ${timeout_seconds}s waiting for RDS $DB_INSTANCE_IDENTIFIER to reach '$target_status'." >&2
            return 1
          }

          DB_STATUS=$(describe_db_status)

          if [ "$DB_STATUS" = "stopping" ]; then
            echo "RDS $DB_INSTANCE_IDENTIFIER is stopping; waiting for it to stop before starting..."
            wait_for_db_status "stopped" 900
            DB_STATUS="stopped"
          fi

          if [ "$DB_STATUS" = "stopped" ]; then
            echo "Starting RDS $DB_INSTANCE_IDENTIFIER..."
            aws rds start-db-instance --db-instance-identifier "$DB_INSTANCE_IDENTIFIER" >/dev/null
            DB_STATUS="starting"
          fi

          if [ "$DB_STATUS" != "available" ]; then
            echo "Waiting for RDS $DB_INSTANCE_IDENTIFIER to become available (current status: $DB_STATUS)..."
            wait_for_db_status "available" 1800
          fi

          DB_STATUS=$(describe_db_status)
          if [ "$DB_STATUS" != "available" ]; then
            echo "RDS $DB_INSTANCE_IDENTIFIER is '$DB_STATUS', not 'available'; aborting deploy." >&2
            exit 1
          fi

          # Register the rendered task definition (new image) so the one-off task
          # runs this build's migrations. Strip read-only fields describe-* adds
          # that register-task-definition rejects.
          jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy,.deregisteredAt)' \
            "$RENDERED_TASKDEF" > migration-task-definition.json
          TASKDEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://migration-task-definition.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          # Reuse the backend service's own subnets/security groups.
          NETCFG=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].networkConfiguration' --output json)

          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$TASKDEF_ARN" \
            --launch-type FARGATE \
            --network-configuration "$NETCFG" \
            --overrides "{\"containerOverrides\":[{\"name\":\"$CONTAINER_NAME\",\"command\":[\"alembic\",\"upgrade\",\"head\"]}]}" \
            --started-by "deploy-migrate-${GITHUB_SHA}" \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: $TASK_ARN"

          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" \
            --query "tasks[0].containers[?name=='${CONTAINER_NAME}'].exitCode | [0]" \
            --output text)
          echo "Migration container exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Database migration failed; aborting deploy before the service rolls out." >&2
            echo "Inspect logs in CloudWatch log group /ecs/empress-backend." >&2
            exit 1
          fi

      - name: Deploy task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2.6.2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Download latest worker task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$WORKER_SERVICE" \
            --query taskDefinition > worker-task-definition.json

      - name: Render worker task definition with new image
        id: render-worker
        uses: aws-actions/amazon-ecs-render-task-definition@v1.8.5
        with:
          task-definition: worker-task-definition.json
          container-name: ${{ env.WORKER_CONTAINER_NAME }}
          image: "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"

      - name: Deploy worker task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2.6.2
        with:
          task-definition: ${{ steps.render-worker.outputs.task-definition }}
          service: ${{ env.WORKER_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Scale services to steady-state counts
        run: |
          MIN_CAPACITY=$(aws ssm get-parameter \
            --name "$ECS_MIN_CAPACITY_PARAMETER" \
            --query 'Parameter.Value' \
            --output text)
          WORKER_DESIRED_COUNT=$(aws ssm get-parameter \
            --name "$WORKER_DESIRED_COUNT_PARAMETER" \
            --query 'Parameter.Value' \
            --output text)

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --desired-count "$MIN_CAPACITY" >/dev/null
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$WORKER_SERVICE" \
            --desired-count "$WORKER_DESIRED_COUNT" >/dev/null
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" "$WORKER_SERVICE"

      - name: Activate autoscaling floor
        run: |
          MIN_CAPACITY=$(aws ssm get-parameter \
            --name "$ECS_MIN_CAPACITY_PARAMETER" \
            --query 'Parameter.Value' \
            --output text)
          MAX_CAPACITY=$(aws application-autoscaling describe-scalable-targets \
            --service-namespace ecs \
            --resource-ids "service/$ECS_CLUSTER/$ECS_SERVICE" \
            --scalable-dimension ecs:service:DesiredCount \
            --query 'ScalableTargets[0].MaxCapacity' \
            --output text)

          if [ -z "$MAX_CAPACITY" ] || [ "$MAX_CAPACITY" = "None" ]; then
            echo "ECS autoscaling target was not found." >&2
            exit 1
          fi

          aws application-autoscaling register-scalable-target \
            --service-namespace ecs \
            --resource-id "service/$ECS_CLUSTER/$ECS_SERVICE" \
            --scalable-dimension ecs:service:DesiredCount \
            --min-capacity "$MIN_CAPACITY" \
            --max-capacity "$MAX_CAPACITY"

      - name: Verify public health endpoint
        run: |
          PUBLIC_API_BASE_URL=$(aws ssm get-parameter \
            --name /empress/backend/public_api_base_url \
            --query 'Parameter.Value' \
            --output text)
          curl --fail --show-error \
            --retry 10 \
            --retry-delay 6 \
            --retry-all-errors \
            "$PUBLIC_API_BASE_URL/health"
