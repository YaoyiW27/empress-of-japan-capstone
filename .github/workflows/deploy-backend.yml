name: deploy-backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "data/ai/personas/**"
      - ".dockerignore"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend-sandbox
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: empress-backend
  ECS_CLUSTER: empress-app
  ECS_SERVICE: empress-backend
  CONTAINER_NAME: backend
  ECS_MIN_CAPACITY_PARAMETER: /empress/ecs/backend_autoscaling_min_capacity
  WORKER_SERVICE: empress-worker
  WORKER_CONTAINER_NAME: worker
  WORKER_DESIRED_COUNT_PARAMETER: /empress/ecs/worker_desired_count

jobs:
  deploy:
    name: Build, scan, and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for deployment infrastructure
        run: |
          for attempt in {1..60}; do
            SERVICE_NAME=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$ECS_SERVICE" \
              --query 'services[0].serviceName' \
              --output text 2>/dev/null || true)
            WORKER_SERVICE_NAME=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$WORKER_SERVICE" \
              --query 'services[0].serviceName' \
              --output text 2>/dev/null || true)
            SCALING_TARGET_COUNT=$(aws application-autoscaling describe-scalable-targets \
              --service-namespace ecs \
              --resource-ids "service/$ECS_CLUSTER/$ECS_SERVICE" \
              --scalable-dimension ecs:service:DesiredCount \
              --query 'length(ScalableTargets)' \
              --output text 2>/dev/null || true)

            if aws ecr describe-repositories \
              --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1 &&
              aws ssm get-parameter \
                --name "$ECS_MIN_CAPACITY_PARAMETER" >/dev/null 2>&1 &&
              aws ssm get-parameter \
                --name "$WORKER_DESIRED_COUNT_PARAMETER" >/dev/null 2>&1 &&
              [ "$SERVICE_NAME" = "$ECS_SERVICE" ] &&
              [ "$WORKER_SERVICE_NAME" = "$WORKER_SERVICE" ] &&
              [ "$SCALING_TARGET_COUNT" = "1" ]; then
              echo "ECR, API, worker, and autoscaling infrastructure are ready."
              exit 0
            fi

            echo "Waiting for Terraform apply ($attempt/60)..."
            sleep 10
          done

          echo "Deployment infrastructure was not ready after 10 minutes." >&2
          exit 1

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2.1.6

      - name: Build amd64 backend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --platform linux/amd64 \
            --file backend/Dockerfile \
            --tag "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "image"
          image-ref: "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          format: "table"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          exit-code: "1"

      - name: Push immutable image tags
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          if aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids imageTag="$IMAGE_TAG" >/dev/null 2>&1; then
            echo "Image tag $IMAGE_TAG already exists; skipping immutable re-push."
          else
            docker push "$IMAGE"
          fi

          if ! aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids imageTag=bootstrap >/dev/null 2>&1; then
            docker tag "$IMAGE" "$REGISTRY/$ECR_REPOSITORY:bootstrap"
            docker push "$REGISTRY/$ECR_REPOSITORY:bootstrap"
          fi

      - name: Download latest task definition
        run: |
          # Use the latest active family revision so Terraform-owned runtime
          # config changes, such as observability environment variables, are
          # picked up on the next application deploy.
          aws ecs describe-task-definition \
            --task-definition "$ECS_SERVICE" \
            --query taskDefinition > task-definition.json

      - name: Render task definition with new image
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1.8.5
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"

      # Apply DB migrations on the freshly built image BEFORE rolling the service
      # over, so new code never runs against an un-migrated schema. A failed
      # migration aborts the deploy. Blocked by #128 (alembic env.py crashes on
      # '%' in the DB password) until that fix lands.
      - name: Run database migrations
        env:
          RENDERED_TASKDEF: ${{ steps.render.outputs.task-definition }}
        run: |
          set -euo pipefail

          # Migrations need a live DB. RDS is often stopped to save sandbox cost,
          # so start it automatically and wait until it's available.
          DB_INSTANCE_IDENTIFIER=empress-knowledge-base
          DB_STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier "$DB_INSTANCE_IDENTIFIER" \
            --query 'DBInstances[0].DBInstanceStatus' --output text)

          if [ "$DB_STATUS" = "stopping" ]; then
            echo "RDS $DB_INSTANCE_IDENTIFIER is stopping; waiting for it to stop before starting..."
            aws rds wait db-instance-stopped --db-instance-identifier "$DB_INSTANCE_IDENTIFIER"
            DB_STATUS="stopped"
          fi

          if [ "$DB_STATUS" = "stopped" ]; then
            echo "Starting RDS $DB_INSTANCE_IDENTIFIER..."
            aws rds start-db-instance --db-instance-identifier "$DB_INSTANCE_IDENTIFIER" >/dev/null
          fi

          if [ "$DB_STATUS" != "available" ]; then
            echo "Waiting for RDS $DB_INSTANCE_IDENTIFIER to become available (current status: $DB_STATUS)..."
            aws rds wait db-instance-available --db-instance-identifier "$DB_INSTANCE_IDENTIFIER"
          fi

          DB_STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier "$DB_INSTANCE_IDENTIFIER" \
            --query 'DBInstances[0].DBInstanceStatus' --output text)
          if [ "$DB_STATUS" != "available" ]; then
            echo "RDS $DB_INSTANCE_IDENTIFIER is '$DB_STATUS', not 'available'; aborting deploy." >&2
            exit 1
          fi

          # Register the rendered task definition (new image) so the one-off task
          # runs this build's migrations. Strip read-only fields describe-* adds
          # that register-task-definition rejects.
          TASKDEF_ARN=$(jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy,.deregisteredAt)' \
            "$RENDERED_TASKDEF" \
            | aws ecs register-task-definition --cli-input-json file:///dev/stdin \
                --query 'taskDefinition.taskDefinitionArn' --output text)

          # Reuse the backend service's own subnets/security groups.
          NETCFG=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].networkConfiguration' --output json)

          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$TASKDEF_ARN" \
            --launch-type FARGATE \
            --network-configuration "$NETCFG" \
            --overrides "{\"containerOverrides\":[{\"name\":\"$CONTAINER_NAME\",\"command\":[\"alembic\",\"upgrade\",\"head\"]}]}" \
            --started-by "deploy-migrate-${GITHUB_SHA}" \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: $TASK_ARN"

          aws ecs wait tasks-stopped --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" \
            --query "tasks[0].containers[?name=='${CONTAINER_NAME}'].exitCode | [0]" \
            --output text)
          echo "Migration container exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Database migration failed; aborting deploy before the service rolls out." >&2
            echo "Inspect logs in CloudWatch log group /ecs/empress-backend." >&2
            exit 1
          fi

      - name: Deploy task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2.6.2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Download latest worker task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$WORKER_SERVICE" \
            --query taskDefinition > worker-task-definition.json

      - name: Render worker task definition with new image
        id: render-worker
        uses: aws-actions/amazon-ecs-render-task-definition@v1.8.5
        with:
          task-definition: worker-task-definition.json
          container-name: ${{ env.WORKER_CONTAINER_NAME }}
          image: "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"

      - name: Deploy worker task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2.6.2
        with:
          task-definition: ${{ steps.render-worker.outputs.task-definition }}
          service: ${{ env.WORKER_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Scale services to steady-state counts
        run: |
          MIN_CAPACITY=$(aws ssm get-parameter \
            --name "$ECS_MIN_CAPACITY_PARAMETER" \
            --query 'Parameter.Value' \
            --output text)
          WORKER_DESIRED_COUNT=$(aws ssm get-parameter \
            --name "$WORKER_DESIRED_COUNT_PARAMETER" \
            --query 'Parameter.Value' \
            --output text)

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --desired-count "$MIN_CAPACITY" >/dev/null
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$WORKER_SERVICE" \
            --desired-count "$WORKER_DESIRED_COUNT" >/dev/null
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" "$WORKER_SERVICE"

      - name: Activate autoscaling floor
        run: |
          MIN_CAPACITY=$(aws ssm get-parameter \
            --name "$ECS_MIN_CAPACITY_PARAMETER" \
            --query 'Parameter.Value' \
            --output text)
          MAX_CAPACITY=$(aws application-autoscaling describe-scalable-targets \
            --service-namespace ecs \
            --resource-ids "service/$ECS_CLUSTER/$ECS_SERVICE" \
            --scalable-dimension ecs:service:DesiredCount \
            --query 'ScalableTargets[0].MaxCapacity' \
            --output text)

          if [ -z "$MAX_CAPACITY" ] || [ "$MAX_CAPACITY" = "None" ]; then
            echo "ECS autoscaling target was not found." >&2
            exit 1
          fi

          aws application-autoscaling register-scalable-target \
            --service-namespace ecs \
            --resource-id "service/$ECS_CLUSTER/$ECS_SERVICE" \
            --scalable-dimension ecs:service:DesiredCount \
            --min-capacity "$MIN_CAPACITY" \
            --max-capacity "$MAX_CAPACITY"

      - name: Verify public health endpoint
        run: |
          PUBLIC_API_BASE_URL=$(aws ssm get-parameter \
            --name /empress/backend/public_api_base_url \
            --query 'Parameter.Value' \
            --output text)
          curl --fail --show-error \
            --retry 10 \
            --retry-delay 6 \
            --retry-all-errors \
            "$PUBLIC_API_BASE_URL/health"
