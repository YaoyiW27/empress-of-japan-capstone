name: terraform-apply

# Runs after a PR is squash-merged to main. The OIDC trust policy only lets the
# `ref:refs/heads/main` subject assume the deploy role, so apply can only ever
# run from main — never from a branch or a fork PR.
on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/apply.yml"

permissions:
  id-token: write # required for OIDC -> AWS
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      TF_VAR_backend_otel_enabled: "true"
      TF_VAR_honeycomb_api_key_secret_arn: ${{ vars.HONEYCOMB_API_KEY_SECRET_ARN }}
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-west-2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Generate backend config from secrets
        run: |
          cat > backend.hcl <<EOF
          bucket         = "${{ secrets.TF_STATE_BUCKET }}"
          dynamodb_table = "${{ secrets.TF_LOCK_TABLE }}"
          region         = "us-west-2"
          EOF

      - name: Terraform init
        run: terraform init -input=false -backend-config=backend.hcl

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false

      - name: Show outputs
        run: terraform output
        