# Local dev database for the Empress of Japan backend.
# Postgres + pgvector, with the schema auto-applied on first start.
#
#   docker compose up -d      # start (schema applies on first run)
#   docker compose down       # stop, keep data
#   docker compose down -v     # stop and wipe data (re-applies schema next up)
#
# The cloud database is AWS RDS (infra/ track) — this compose file is for
# local development only.

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: eoj-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: empress
    ports:
      - "5432:5432"
    volumes:
      # Persisted data. /docker-entrypoint-initdb.d only runs when this is empty,
      # so the schema applies on first start (or after `down -v`).
      - eoj_pgdata:/var/lib/postgresql/data
      # Auto-apply the schema on initial container creation.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d empress"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  eoj_pgdata:
